Name: danmakustream-api
Host: 0.0.0.0
Port: 8080

Auth:
  AccessSecret: "your-jwt-secret-key-change-in-production"
  AccessExpire: 86400  # 24 hours in seconds

Database:
  DataSource: "root:password@tcp(127.0.0.1:3306)/danmakustream?charset=utf8mb4&parseTime=True&loc=Local"

